name: OTA Update

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      message:
        description: 'Описание обновления'
        required: false
        default: ''

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # Using `npm install` instead of `npm ci` because the lock file was
        # generated on Windows and is missing Linux-only optional binary
        # dependencies (e.g. sharp's @img/sharp-wasm32 wasm chain →
        # @emnapi/runtime). `npm install` repairs the lock on the fly;
        # `npm ci`'s strict validation otherwise rejects the install.
        # `--no-audit --no-fund` keeps the noise down.
        run: npm install --no-audit --no-fund --omit=optional

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA Update
        run: |
          eas update --branch production --message "${MSG}" --platform ios
        env:
          CI: '1'
          MSG: ${{ github.event.inputs.message || github.event.head_commit.message || 'OTA update' }}
          # Source-maps upload to Sentry on each OTA so stack traces stay readable.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
