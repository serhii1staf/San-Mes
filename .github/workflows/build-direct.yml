name: iOS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16 (iOS 18 SDK)
        # iOS 26 / Xcode 26 has a regression where setAlternateIconName fails
        # with "Resource temporarily unavailable" (the icon-change system alert
        # can't acquire its token). Building against the iOS 18 SDK (Xcode 16)
        # uses the old, working icon-change path on all devices incl. iOS 26.
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_16*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Apple §3.3.4 license gate: fail the build if any bundled profile-theme
      # illustration/font asset ships without a license record.
      - name: Verify theme asset licenses
        run: npm run verify:theme-assets

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write ASC API Key
        run: echo "${{ secrets.ASC_API_KEY_P8 }}" > ./AuthKey_PN7B743Y4X.p8

      - name: Make scripts executable
        run: chmod +x eas-build-post-install.sh

      - name: Build iOS locally with EAS
        run: eas build --platform ios --profile production --local --output ./San.ipa --non-interactive
        env:
          # Source-maps upload to Sentry happens automatically when this is set.
          # Without it the build still works but stack traces will be minified.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Upload to TestFlight
        if: success()
        run: |
          mkdir -p ~/private_keys
          cp ./AuthKey_PN7B743Y4X.p8 ~/private_keys/AuthKey_PN7B743Y4X.p8
          xcrun altool --upload-app --type ios --file ./San.ipa --apiKey PN7B743Y4X --apiIssuer "8c0acc2b-73e7-4067-884b-790f14bf4b92"
