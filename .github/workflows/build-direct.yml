name: iOS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 60
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write ASC API Key
        run: echo "${{ secrets.ASC_API_KEY_P8 }}" > ./AuthKey_PN7B743Y4X.p8

      - name: Patch fmt in node_modules before build
        run: |
          FMT_BASE="node_modules/react-native/third-party-podspecs/fmt.podspec"
          if [ -f "$FMT_BASE" ]; then
            # Add compiler flag to disable FMT_USE_CONSTEVAL in the podspec
            sed -i '' 's/s.compiler_flags.*/s.compiler_flags = "-DFMT_USE_CONSTEVAL=0"/' "$FMT_BASE" 2>/dev/null || true
          fi
          
          # Create a patch script that EAS will run
          cat > eas-build-on-success.sh << 'EOF'
          echo "Build completed"
          EOF
          chmod +x eas-build-on-success.sh

      - name: Create Podfile patch
        run: |
          mkdir -p patches
          cat > patches/fix-fmt.rb << 'RUBY'
          # This gets sourced in Podfile post_install
          def patch_fmt(installer)
            fmt_base = File.join(installer.sandbox.root, 'fmt', 'include', 'fmt', 'base.h')
            if File.exist?(fmt_base)
              content = File.read(fmt_base)
              content.gsub!('#  define FMT_USE_CONSTEVAL 1', '#  define FMT_USE_CONSTEVAL 0')
              File.write(fmt_base, content)
              puts "[PATCH] Disabled FMT_USE_CONSTEVAL in fmt/base.h"
            end
          end
          RUBY

      - name: Build with EAS local + env override
        run: |
          # Set CFLAGS to disable consteval globally
          export OTHER_CPLUSPLUSFLAGS="-DFMT_USE_CONSTEVAL=0"
          export CXXFLAGS="-DFMT_USE_CONSTEVAL=0"
          eas build --platform ios --profile production --local --output ./San.ipa --non-interactive
        env:
          EXPO_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          OTHER_CPLUSPLUSFLAGS: "-DFMT_USE_CONSTEVAL=0"
          CXXFLAGS: "-DFMT_USE_CONSTEVAL=0"
          GCC_PREPROCESSOR_DEFINITIONS: "FMT_USE_CONSTEVAL=0"

      - name: Upload to TestFlight
        if: success()
        run: |
          mkdir -p ~/private_keys
          cp ./AuthKey_PN7B743Y4X.p8 ~/private_keys/AuthKey_PN7B743Y4X.p8
          xcrun altool --upload-app --type ios --file ./San.ipa --apiKey PN7B743Y4X --apiIssuer "8c0acc2b-73e7-4067-884b-790f14bf4b92"
